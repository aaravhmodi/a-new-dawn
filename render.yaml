services:
  - type: web
    name: a-new-dawn-api
    runtime: python
    buildCommand: pip install .
    startCommand: uvicorn a_new_dawn.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVER_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: API_HOST
        value: "0.0.0.0"
